name: Deploy Expo Web to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_FB_API_KEY: ${{ secrets.EXPO_PUBLIC_FB_API_KEY }}
      EXPO_PUBLIC_FB_DOMAIN: ${{ secrets.EXPO_PUBLIC_FB_DOMAIN }}
      EXPO_PUBLIC_FB_PROJID: ${{ secrets.EXPO_PUBLIC_FB_PROJID }}
      EXPO_PUBLIC_FB_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FB_STORAGE_BUCKET }}
      EXPO_PUBLIC_FB_MSGSENDERID: ${{ secrets.EXPO_PUBLIC_FB_MSGSENDERID }}
      EXPO_PUBLIC_FB_APPID: ${{ secrets.EXPO_PUBLIC_FB_APPID }}
      EXPO_PUBLIC_FB_MEASUREMENTID: ${{ secrets.EXPO_PUBLIC_FB_MEASUREMENTID }}
      EXPO_PUBLIC_MAPTILER_API_KEY: ${{ secrets.EXPO_PUBLIC_MAPTILER_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required public env vars
        run: |
          set -e
          required_vars=(
            EXPO_PUBLIC_FB_API_KEY
            EXPO_PUBLIC_FB_DOMAIN
            EXPO_PUBLIC_FB_PROJID
            EXPO_PUBLIC_FB_STORAGE_BUCKET
            EXPO_PUBLIC_FB_MSGSENDERID
            EXPO_PUBLIC_FB_APPID
            EXPO_PUBLIC_FB_MEASUREMENTID
          )

          missing=0
          normalized_fb_api_key=""
          for var_name in "${required_vars[@]}"; do
            raw_value="${!var_name}"
            normalized_value="$raw_value"

            if [[ "$normalized_value" == \"*\" ]]; then
              normalized_value="${normalized_value#\"}"
              normalized_value="${normalized_value%\"}"
            fi

            if [[ "$normalized_value" == \'*\' ]]; then
              normalized_value="${normalized_value#\'}"
              normalized_value="${normalized_value%\'}"
            fi

            normalized_value="$(echo -n "$normalized_value" | tr -d '\r')"

            if [ -z "$normalized_value" ]; then
              echo "Missing required GitHub secret mapped to $var_name"
              missing=1
            else
              echo "::add-mask::$normalized_value"
              echo "$var_name=$normalized_value" >> "$GITHUB_ENV"
              if [ "$var_name" = "EXPO_PUBLIC_FB_API_KEY" ]; then
                normalized_fb_api_key="$normalized_value"
              fi
            fi
          done

          if [ -n "${EXPO_PUBLIC_MAPTILER_API_KEY}" ]; then
            mt_key="${EXPO_PUBLIC_MAPTILER_API_KEY}"
            if [[ "$mt_key" == \"*\" ]]; then
              mt_key="${mt_key#\"}"
              mt_key="${mt_key%\"}"
            fi
            mt_key="$(echo -n "$mt_key" | tr -d '\r')"
            echo "::add-mask::$mt_key"
            echo "EXPO_PUBLIC_MAPTILER_API_KEY=$mt_key" >> "$GITHUB_ENV"
          fi

          if [ "$missing" -ne 0 ]; then
            echo "One or more required EXPO_PUBLIC_* secrets are missing."
            exit 1
          fi

          if [[ ! "$normalized_fb_api_key" =~ ^AIza ]]; then
            echo "EXPO_PUBLIC_FB_API_KEY does not look valid after normalization."
            echo "Tip: paste only the raw secret value in GitHub, without quotes."
            exit 1
          fi

      - name: Export static web build
        run: npx expo export -p web --output-dir dist

      - name: Configure SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Wait for site readiness
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -e
          echo "Checking site readiness at: ${PAGE_URL}"

          # GitHub Pages can take a short time to propagate after a successful deploy.
          for attempt in $(seq 1 30); do
            status=$(curl -L -s -o /dev/null -w "%{http_code}" "${PAGE_URL}")
            if [ "$status" = "200" ]; then
              echo "Site is ready (HTTP 200)."
              exit 0
            fi

            echo "Attempt ${attempt}/30 -> HTTP ${status}; waiting 10s..."
            sleep 10
          done

          echo "Site did not return HTTP 200 within the readiness window."
          exit 1